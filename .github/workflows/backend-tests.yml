name: Backend Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: aidflow_user
          POSTGRES_PASSWORD: aidflow_password
          POSTGRES_DB: aidflow_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aidflow_user -d aidflow_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aidflow_user:aidflow_password@localhost:5432/aidflow_db
      SECRET_KEY: test_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        working-directory: backend
        run: |
          alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        run: |
          pytest